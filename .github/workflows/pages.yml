# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on published releases
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab (dev builds)
  workflow_dispatch:
    inputs:
      version:
        description: "App version (e.g. 2.1.0-dev)"
        required: true

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove placeholder cardbacks
        if: ${{ startsWith(github.repository, 'FABKIT/') }}
        run: rm -rf public/cardbacks/generated

      - name: Pull Cardbacks
        if: ${{ startsWith(github.repository, 'FABKIT/') }}
        uses: actions/checkout@v4
        with:
          repository: FABKIT/cardbacks
          ssh-key: ${{ secrets.CARDBACK_KEY }}
          path: 'public/cardbacks'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=$(echo '${{ github.ref_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Update PWA assets
        run: bun run scripts/update-pwa-assets

      - name: Build (Production)
        if: ${{ github.repository == 'FABKIT/FABKIT' }}
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: bun run build

      - name: Build (Staging)
        if: ${{ github.repository != 'FABKIT/FABKIT' }}
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: bun run build -- --mode staging

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload dist folder
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
